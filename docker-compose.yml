services:
  sentiment-api:
    build: .
    image: sentiment-api:latest
    container_name: sentiment-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      WEB_CONCURRENCY: 4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s   # give gunicorn time to load model + warmup

  # Optional: run locust load test against the containerised API
  locust:
    image: locustio/locust:latest
    container_name: locust
    ports:
      - "8089:8089"       # Locust web UI
    volumes:
      - .:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host http://sentiment-api:8000
    depends_on:
      sentiment-api:
        condition: service_healthy
    profiles:
      - loadtest            # only starts with: docker compose --profile loadtest up
