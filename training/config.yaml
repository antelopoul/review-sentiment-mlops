# Sentiment Classification Training Configuration

# Data paths
data:
  data_files: "data/Books_10k.zip"
  val_size: 0.1
  test_size: 0.1
  seed: 42

# Model configuration
model:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  num_labels: 3  # 0: negative, 1: neutral, 2: positive
  max_length: 128
  output_dir: "./models/sentimentv1"

# Training hyperparameters
training:
  num_epochs: 3
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  learning_rate: 0.00002  # 2e-5
  weight_decay: 0.01
  eval_strategy: "epoch"
  save_strategy: "epoch"
  logging_steps: 100
  save_total_limit: 2

# Preprocessing
preprocessing:
  spacy_model: "en_core_web_md"
  disable_components: ["ner", "tagger"]
  min_sentence_length: 3

# Label mapping (review rating to sentiment class)
label_map:
  1: 0  # 1 star -> negative
  2: 0  # 2 stars -> negative
  3: 1  # 3 stars -> neutral
  4: 2  # 4 stars -> positive
  5: 2  # 5 stars -> positive
